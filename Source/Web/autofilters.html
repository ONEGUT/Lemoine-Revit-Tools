<!doctype html>
<html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Auto Filters</title>
<link rel="stylesheet" href="lib/lemoine.css">
</head>
<body>
<div id="app" class="l-af"></div>

<script src="lemoine-bridge.js"></script>
<script src="lib/lemoine.js"></script>
<script src="lib/autofilters.js"></script>
<script>
  var app = document.getElementById('app');
  var af = Lemoine.autoFilters({ send: function (t, p) { Lemoine.send(t, p); } });
  Lemoine.on('init', function (p) { af.render(app, p); });

  // Standalone demo (plain browser / headless screenshot - no C# bridge).
  if (!Lemoine.hasBridge() || /(?:\?|&)demo\b/.test(location.search)) {
    var labels = {
      undoTip: 'Undo', redoTip: 'Redo', history: 'History', deleteFromProject: 'Delete from Project',
      templates: 'Templates', discover: 'Discover', addTrade: 'Add Trade',
      applyToView: 'Apply to view', removeFromView: 'Remove from view',
      editTradeTip: 'Edit trade', editRuleTip: 'Edit rule', addRule: 'Add Rule',
      applyTradeToView: 'Apply trade to view', noRule: 'Select a rule to edit it.',
      filterLogic: 'Filter Logic', overrideStyle: 'Override Style', appearance: 'Appearance & Visibility',
      category: 'Category', addCategoryTip: 'Add category', all: 'All',
      allDesc: 'Whole category — match every element (ignores parameter & keywords)',
      parameter: 'Parameter', pickParameterTip: 'Pick parameter',
      builtInParam: 'Built-in parameter — applies to linked models.',
      searchString: 'Search string', addKeywordTip: 'Add keyword', removeTip: 'Remove',
      matchContains: 'contains', matchEquals: 'equals',
      colors: 'Colors', surface: 'Surface', cut: 'Cut', lines: 'Lines', solidFill: '(solid fill)',
      pickColorTip: 'Pick colour', transparency: 'Transparency',
      halftone: 'Halftone', halftoneDesc: 'Halftone',
      visible: 'Visible', visibleDesc: 'Elements visible — when off, matching elements are hidden in the view.',
      filterOn: 'Apply', filterOnDesc: 'Apply this rule — when off, the rule is skipped (no filter is created).'
    };
    af.render(app, {
      title: 'Auto Filters', labels: labels, canUndo: false, canRedo: false,
      trades: [
        { id: 'T1', label: 'LSUSQ_A_MDUCT', color: '#b085b8', checked: true, active: true },
        { id: 'T2', label: 'LSUSQ_A_MPIPE', color: '#f2a0c0', checked: true, active: false },
        { id: 'T3', label: 'Gallo_PL', color: '#57b0e0', checked: true, active: false },
        { id: 'T4', label: 'ELectrical', color: '#e8d44d', checked: true, active: false },
        { id: 'T5', label: 'Insulation', color: '#e5e5e5', checked: true, active: false },
        { id: 'T6', label: 'Ceiling Heatmap...', color: '#57b0e0', checked: true, active: false },
        { id: 'T7', label: 'Ceiling Heatmap', color: '#57b0e0', checked: true, active: false },
        { id: 'T8', label: 'Ceiling Grids —...', color: '#9a9a9a', checked: true, active: false }

        { id: 'R2', name: 'Exhaust Air 2wg', color: '#9a6fa3', catLabel: 'MEP Fabrication Ductwork', active: false, enabled: true },
        { id: 'R3', name: 'Outside Air 2wg', color: '#e8963c', catLabel: 'MEP Fabrication Ductwork', active: false, enabled: true },
        { id: 'R4', name: 'Secondary Supply', color: '#2f6fd0', catLabel: 'MEP Fabrication Ductwork', active: false, enabled: true },

        id: 'R1', name: 'Fire Dampers (copy)',
        categories: [{ ost: 'OST_DuctAccessory', label: 'Duct Accessories' }],
        matchType: 'contains',
        parameter: 'Family Name', parameterBuiltIn: true,
        keywords: ['Fire'],
        surface: { on: true, layer: 'FG', color: '#d94b40', pattern: '' },
        cut: { on: true, layer: 'FG', color: '#8c8c8c', pattern: '' },
