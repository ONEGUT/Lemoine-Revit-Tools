<!doctype html>
<html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lemoine tool</title>
<link rel="stylesheet" href="lib/lemoine.css">
</head>
<body>
<div id="app" class="l-flow"></div>

<script src="lemoine-bridge.js"></script>
<script src="lib/lemoine.js"></script>
<script src="lib/stepflow.js"></script>
<script>
  var app = document.getElementById('app');
  var sf = Lemoine.stepflow(app, { send: function (type, payload) { Lemoine.send(type, payload); } });

  // Inbound bridge -> shell (rule R17 message types)
  Lemoine.on('init',       function (p) { sf.init(p); });
  Lemoine.on('validation', function (p) { sf.applyValidation(p); });
  Lemoine.on('log',        function (p) { sf.pushLog(p.text, p.status); });
  Lemoine.on('progress',   function (p) { sf.setProgress(p); });
  Lemoine.on('complete',   function (p) { sf.complete(p); });
  Lemoine.on('stepSummary',function (p) { sf.setStepSummary(p.stepId, p.text); });
  Lemoine.on('stepHidden', function (p) { sf.setStepHidden(p.stepId, p.hidden); });
  Lemoine.on('stepInputs', function (p) { sf.setStepInputs(p.stepId, p.inputs); });
  Lemoine.on('title',      function (p) { sf.setTitle(p.text); });

  // Standalone demo driver: with no C# bridge (plain browser / headless screenshot),
  // OR ?demo in the URL, mock a Print-View-like tool so the shell renders and runs.
  var demoMode = !Lemoine.hasBridge() || /(?:\?|&)demo\b/.test(location.search);
  if (demoMode) {
    var spec = {
      title: 'Print View', runLabel: 'Run in Revit →',
      steps: [
        { id: 'S1', title: 'Formats', required: true, summary: 'PDF, links in blue', inputs: [
          { kind: 'singleSelect', id: 'format', label: 'Output format', value: 'pdf', options: [
            { value: 'pdf', label: 'PDF' }, { value: 'dwg', label: 'DWG' },
            { value: 'nwc', label: 'NWC (3D only)', disabled: true }, { value: 'ifc', label: 'IFC (3D only)', disabled: true } ] },
          { kind: 'toggle', id: 'blue', label: 'View links in blue', checked: true },
          { kind: 'toggle', id: 'halftone', label: 'Replace halftone with thin lines', checked: false } ] },
        { id: 'S2', title: 'Output folder', required: true, summary: 'C:\\Exports\\PrintView', inputs: [
          { kind: 'textField', id: 'folder', label: 'Folder', value: 'C:\\Exports\\PrintView' },
          { kind: 'textField', id: 'pattern', label: 'Filename pattern', value: '{SheetNumber}-{SheetName}' } ] },
        { id: 'S3', title: 'Review & Run', required: false, summary: '', inputs: [
          { kind: 'warn', id: 'w', text: '1 selected view is not a sheet - it will be named from the view name, not a sheet number.' } ] }
      ]
    };
    sf.init(spec);
    sf.applyValidation({ steps: { S1: true, S2: true }, canRun: true });

    // Mock C#: recompute validation on state, and simulate a run on the run action.
    var origSend = Lemoine.send;
    Lemoine.send = function (type, payload) {
      if (type === 'action' && payload.action === 'run') {
        var pct = 0, pass = 0;
        sf.pushLog('Starting Print View...', 'info');
        var t = setInterval(function () {
          pct += 20; pass += 2;
          sf.setProgress({ pct: pct, pass: pass, fail: 0, skip: 0 });
          sf.pushLog(pct + '% - exported sheet A' + (pass) + '.pdf', 'pass');
          if (pct >= 100) { clearInterval(t); sf.complete({ pass: pass, fail: 0, skip: 0 }); }
        }, 250);
      }
    };
  }
</script>
</body></html>
